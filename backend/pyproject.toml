[tool.pytest.ini_options]
addopts = "--strict-markers --strict-config --cov=app --cov-report=term-missing"
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]
pythonpath = ["."]
[tool.ruff]
target-version = "py312"
line-length = 100
[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "ASYNC"]
[tool.mypy]
python_version = "3.12"
strict = true
plugins = ["pydantic.mypy"]
exclude = ["alembic"]

[tool.ruff.lint.per-file-ignores]
"app/auth/routes.py" = ["B008"]
"app/auth/dependencies.py" = ["B008"]
"app/profiles/routes.py" = ["B008"]
"app/dashboard/routes.py" = ["B008"]
"app/chat/routes.py" = ["B008"]
"app/api/routes/safety.py" = ["B008"]
"app/symptoms/routes.py" = ["B008"]
"app/medicines/routes.py" = ["B008"]
"app/records/routes.py" = ["B008"]
"app/reports/routes.py" = ["B008"]
"app/reminders/routes.py" = ["B008"]
"app/misinformation/routes.py" = ["B008"]
